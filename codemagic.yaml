# Codemagic CI/CD — builds the native SwiftUI Ya Spa app on Codemagic's cloud Macs.
# No Mac needed. Uses XcodeGen to generate the Xcode project from YaSpa/project.yml.
#
# One-time setup (done):
#   - App Store Connect API key added in Codemagic Developer Portal, named "Ya Spa CI".
#   - App record "Ya Spa" (bundle sa.yaspa.app) created in App Store Connect.

workflows:
  ios:
    name: Ya Spa — iOS (App Store / TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Ya Spa CI
    # Auto-trigger disabled: GitHub Actions is now the delivery pipeline. Leaving Codemagic
    # on push would race the same App Store Connect signing certs. Run Codemagic manually if needed.
    environment:
      vars:
        BUNDLE_ID: "sa.yaspa.app"
        XCODE_SCHEME: "App"
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: cd YaSpa && xcodegen generate
      - name: Set up code signing (create cert + profile via the API key)
        script: |
          keychain initialize
          app-store-connect bundle-ids create "$BUNDLE_ID" --platform IOS --name "Ya Spa" 2>/dev/null \
            || echo "bundle id already registered — continuing"
          openssl genrsa 2048 > /tmp/yaspa_cert_key.pem 2>/dev/null
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/yaspa_cert_key.pem \
            --create
          keychain add-certificates
          cd YaSpa && xcode-project use-profiles
      - name: Bump build number to next TestFlight number
        script: |
          cd YaSpa
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST + 1))
      - name: Build .ipa
        script: |
          cd YaSpa
          xcode-project build-ipa --project "YaSpa.xcodeproj" --scheme "$XCODE_SCHEME"
    artifacts:
      - YaSpa/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
