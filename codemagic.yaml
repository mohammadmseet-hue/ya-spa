# Codemagic CI/CD — builds the Ya Spa app on Codemagic's cloud Macs.
# You do NOT need your own Mac. Connect this repo in Codemagic, add your Apple
# App Store Connect API key in the Codemagic UI, then run the ios workflow.
#
# Setup once (after your Apple account activates):
#   1. codemagic.io → add this repository.
#   2. Codemagic → Settings → Team integrations → Developer Portal → connect your
#      App Store Connect API key (.p8 + Key ID + Issuer ID). Name it "Ya Spa CI".
#   3. First run the `ios` workflow to push a build to TestFlight.
#
# App identity (must match App Store Connect): appId = sa.yaspa.app, name = "Ya Spa".

workflows:
  # ---------------------------------------------------------------- iOS
  ios:
    name: Ya Spa — iOS (App Store / TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Ya Spa CI   # <- matches the Developer Portal key name in Codemagic
    environment:
      vars:
        BUNDLE_ID: "sa.yaspa.app"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS deps
        script: cd app && npm install
      - name: Copy web + scaffold iOS project
        script: |
          cd app
          npm run copy:web
          npx cap add ios || npx cap sync ios
      - name: Generate icons & splash (from app/assets/icon.png)
        script: cd app && npm run assets || echo "no app/assets/icon.png yet — using default"
      - name: Set up code signing (auto-create App ID, certificate + profile)
        script: |
          keychain initialize
          # Register the App ID in the Apple Developer portal (no-op if it already exists)
          app-store-connect create-bundle-id "$BUNDLE_ID" --platform IOS --name "Ya Spa" 2>/dev/null \
            || echo "bundle id already registered — continuing"
          # Create a distribution certificate + App Store provisioning profile via the API key
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          cd app/ios/App
          xcode-project use-profiles
      - name: CocoaPods install
        script: cd app/ios/App && pod install
      - name: Bump build number to next TestFlight number
        script: |
          cd app/ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST + 1))
      - name: Build .ipa
        script: |
          cd app/ios/App
          xcode-project build-ipa --workspace "App.xcworkspace" --scheme "$XCODE_SCHEME"
    artifacts:
      - app/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # submit_to_app_store: false   # flip to true once you're ready for review
