    <g transform="rotate(144 60 60)"><ellipse cx="60" cy="35" rx="11" ry="25"/></g>
    <g transform="rotate(216 60 60)"><ellipse cx="60" cy="35" rx="11" ry="25"/></g>
    <g transform="rotate(288 60 60)"><ellipse cx="60" cy="35" rx="11" ry="25"/></g>
  </g>
  <circle cx="60" cy="60" r="10" fill="#C9A15E"/>
