name: YaSpa
options:
  bundleIdPrefix: sa.yaspa
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: "apple-generic"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "K645N4JENC"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
targets:
  App:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - Resources
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "sa.yaspa.app"
        INFOPLIST_FILE: "Info.plist"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_BITCODE: "NO"
        CODE_SIGN_STYLE: "Manual"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        VERSIONING_SYSTEM: "apple-generic"
  AppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - UITests
    dependencies:
      - target: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "sa.yaspa.uitests"
        TEST_TARGET_NAME: "App"
schemes:
  App:
    build:
      targets:
        App: all
        AppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AppUITests
    archive:
      config: Release
