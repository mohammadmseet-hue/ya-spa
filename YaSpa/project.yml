name: YaSpa
options:
  bundleIdPrefix: sa.yaspa
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: "apple-generic"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "K645N4JENC"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    # Pinned exactly (was `from: 2.0.0`, which floated to the newest 2.x on every clean
    # resolve — so two machines / two days could embed different SDK builds for the same
    # commit, and the TestFlight binary need not match what CI ever launched). 2.51.0 is the
    # version CI validates; its iOS-16 package floor matches this app's deploymentTarget.
    exactVersion: "2.51.0"
targets:
  App:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
      - Resources
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "sa.yaspa.app"
        INFOPLIST_FILE: "Info.plist"
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: "AccentColor"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_BITCODE: "NO"
        # iOS 18 SDK split SwiftUI into SwiftUI + the private SwiftUICore.framework, which does
        # NOT exist on iOS 16/17. Building with a modern Xcode links SwiftUICore, so dyld kills
        # the app at launch on iOS 16 ("Library not loaded: .../SwiftUICore.framework"). Weak-
        # linking it lets dyld tolerate its absence (present & used on iOS 18+, skipped on 16/17),
        # and disabling the Xcode-16 debug dylib removes the same reference from Debug builds.
        OTHER_LDFLAGS: "-weak_framework SwiftUICore"
        ENABLE_DEBUG_DYLIB_SUPPORT: "NO"
        CODE_SIGN_STYLE: "Manual"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        VERSIONING_SYSTEM: "apple-generic"
  AppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - UITests
    dependencies:
      - target: App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "sa.yaspa.uitests"
        TEST_TARGET_NAME: "App"
schemes:
  App:
    build:
      targets:
        App: all
        AppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AppUITests
    archive:
      config: Release
