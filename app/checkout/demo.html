<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ya Spa — Payment demo</title>
<link rel="stylesheet" href="https://cdn.moyasar.com/mpf/1.15.0/moyasar.css">
<style>
  body{font-family:system-ui,-apple-system,sans-serif;background:#FFF5F7;margin:0;padding:24px;color:#3a2230}
  .card{max-width:460px;margin:6vh auto;background:#fff;border-radius:20px;padding:22px;box-shadow:0 20px 60px rgba(158,43,82,.12)}
  h1{font-size:1.15rem;margin:.2rem 0 .1rem} p{color:#7a5966;margin:.2rem 0 1rem;font-size:.9rem}
  .warn{background:#fdeef2;border:1px solid #f3c6d5;border-radius:12px;padding:10px 12px;font-size:.82rem;color:#9E2B52;margin-bottom:14px}
</style>
</head>
<body>
  <div class="card">
    <h1>يا سبا — تجربة الدفع · Payment demo</h1>
    <p>مبلغ تجريبي ٢٠٠ ﷼ · Test amount SAR 200</p>
    <div class="warn" id="warn"></div>
    <div class="mysr-form"></div>
  </div>

  <!-- your real config (copy config.example.js → config.js and add a TEST key) -->
  <script src="../config.js" onerror="document.getElementById('warn').textContent='Create config.js from config.example.js and add your Moyasar TEST publishable key.'"></script>
  <script src="https://cdn.moyasar.com/mpf/1.15.0/moyasar.js"></script>
  <script>
    var CFG = window.YASPA_PAY || {};
    if (/^pk_(test|live)_/.test(CFG.publishableKey || '')) {
      document.getElementById('warn').textContent = 'Test card: 4111 1111 1111 1111 · any future expiry · any CVC';
      Moyasar.init({
        element: '.mysr-form',
        language: 'ar',
        amount: 20000,               // 200.00 SAR in halalas
        currency: 'SAR',
        description: 'Ya Spa demo booking',
        publishable_api_key: CFG.publishableKey,
        callback_url: CFG.callbackUrl || location.href,
        methods: CFG.methods || ['creditcard', 'applepay', 'stcpay']
      });
    } else if (!document.getElementById('warn').textContent) {
      document.getElementById('warn').textContent = 'Add your Moyasar TEST publishable key to config.js to load the form.';
    }
  </script>
</body>
</html>
