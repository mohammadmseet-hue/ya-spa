name: iOS 16 cold-launch repro

# The user's crash is a dyld "Library not loaded: SwiftUICore.framework" abort at launch on
# iOS 16 (SwiftUICore is an iOS-18 private framework; a modern Xcode links it). This job builds
# with Xcode 16.4 on a real iOS 16.4 simulator and cold-launches (no -uitest) to VERIFY the fix
# (weak-link SwiftUICore + disable the Xcode-16 debug dylib) makes both Debug and Release launch.
# Isolated on the fix branch so it never touches the shipping pipeline.

on:
  push:
    branches: [ fix/launch-crash-hardening ]
  workflow_dispatch:

concurrency:
  group: ios16-repro-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repro:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4 (swift-tools 6.1 + iOS 16 sim capable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd YaSpa && xcodegen generate

      - name: Ensure an iOS 16 simulator runtime
        id: rt
        run: |
          if ! xcrun simctl list runtimes | grep -qi "iOS 16"; then
            echo "Downloading iOS 16.4 runtime..."
            xcodebuild -downloadPlatform iOS -buildVersion 16.4 2>&1 | tail -5 || true
          fi
          xcrun simctl list runtimes | grep -i "iOS 16" || { echo "::error::no iOS 16 runtime"; exit 1; }

      - name: Create & boot an iOS 16 iPhone simulator
        id: sim
        run: |
          RT_ID=$(xcrun simctl list runtimes -j | python3 -c "
          import json,sys
          for r in json.load(sys.stdin)['runtimes']:
              if r.get('isAvailable') and r.get('version','').startswith('16'): print(r['identifier']); break
          ")
          DEV=$(xcrun simctl list devicetypes -j | python3 -c "
          import json,sys
          names={d['name']:d['identifier'] for d in json.load(sys.stdin)['devicetypes']}
          for n in ('iPhone 14','iPhone 13','iPhone SE (3rd generation)'):
              if n in names: print(names[n]); break
          ")
          echo "runtime=$RT_ID device=$DEV"
          UDID=$(xcrun simctl create "iOS16-repro" "$DEV" "$RT_ID")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || true

      - name: Test Debug + Release on iOS 16 (build → otool → cold-launch)
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          UDID="${{ steps.sim.outputs.udid }}"
          FAIL=0

          test_config () {
            CONFIG="$1"
            echo "======================== $CONFIG ========================"
            ( cd YaSpa && xcodebuild build -project YaSpa.xcodeproj -scheme App \
                -configuration "$CONFIG" -sdk iphonesimulator \
                -destination "id=$UDID" CODE_SIGNING_ALLOWED=NO ) || { echo "::error::$CONFIG build failed"; FAIL=1; return; }

            APP=$(find ~/Library/Developer/Xcode/DerivedData -name 'App.app' -path "*$CONFIG-iphonesimulator*" | head -1)
            echo "$CONFIG app: $APP"
            echo "--- SwiftUICore load command in the main binary ($CONFIG) ---"
            otool -l "$APP/App" | awk '/cmd LC_LOAD/{c=$2} /name .*SwiftUICore/{print c, $2}' || true
            echo "--- debug dylib present? ---"
            ls -la "$APP/App.debug.dylib" 2>/dev/null && echo "debug.dylib EXISTS" || echo "no debug.dylib (good)"
            if [ -f "$APP/App.debug.dylib" ]; then
              echo "--- SwiftUICore in debug.dylib ---"
              otool -l "$APP/App.debug.dylib" | awk '/cmd LC_LOAD/{c=$2} /name .*SwiftUICore/{print c, $2}' || true
            fi

            xcrun simctl install "$UDID" "$APP"
            rm -f ~/Library/Logs/DiagnosticReports/*.ips 2>/dev/null || true
            OUT=$(xcrun simctl launch --terminate-running-process "$UDID" sa.yaspa.app) || true
            echo "$OUT"
            PID=$(echo "$OUT" | awk -F': ' '{print $2}')
            sleep 12
            CR=""
            for f in $(ls -t ~/Library/Logs/DiagnosticReports/*.ips 2>/dev/null | head -10); do
              if grep -qiE "sa\.yaspa\.app|YaSpa" "$f"; then CR="$f"; break; fi
            done
            if [ -n "$CR" ]; then
              echo "::error::$CONFIG STILL CRASHES on iOS 16. Report: $CR"
              cp "$CR" "$GITHUB_WORKSPACE/artifacts/ios16-$CONFIG-crash.ips" 2>/dev/null || true
              grep -iE "Library not loaded|namespace|reasons" "$CR" | head -5 || true
              FAIL=1
            elif [ -n "$PID" ] && kill -0 "$PID" 2>/dev/null; then
              echo "PASS: $CONFIG app ALIVE 12s after iOS 16 cold launch."
            else
              echo "::warning::$CONFIG inconclusive (pid $PID not alive, no crash report)."
            fi
            xcrun simctl io "$UDID" screenshot "$GITHUB_WORKSPACE/artifacts/ios16-$CONFIG.png" || true
            xcrun simctl terminate "$UDID" sa.yaspa.app 2>/dev/null || true
          }

          test_config Debug
          test_config Release

          echo "==================================================="
          if [ "$FAIL" = "1" ]; then echo "::error::iOS 16 launch still failing"; exit 1; fi
          echo "ALL GOOD: Debug + Release both cold-launch on iOS 16."

      - name: Upload iOS 16 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios16-repro-evidence
          path: artifacts/
          if-no-files-found: warn
