name: iOS release to TestFlight

# Manual: I trigger this once your App Store Connect API key is added as 3 secrets.
# It builds -> signs -> uploads the signed .ipa to TestFlight, entirely on GitHub Actions.
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 50
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      BUNDLE_ID: sa.yaspa.app
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify secrets are present
        run: |
          if [ -z "$APP_STORE_CONNECT_ISSUER_ID" ] || [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] || [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "::error::Add APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, and APP_STORE_CONNECT_PRIVATE_KEY under repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Install tools
        run: |
          brew install xcodegen
          python3 -m pip install --user --break-system-packages codemagic-cli-tools
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: cd YaSpa && xcodegen generate

      - name: Set up code signing (create cert + profile via the API key)
        run: |
          keychain initialize
          app-store-connect bundle-ids create "$BUNDLE_ID" --platform IOS --name "Ya Spa" 2>/dev/null \
            || echo "bundle id already registered — continuing"
          openssl genrsa 2048 > /tmp/yaspa_cert_key.pem 2>/dev/null
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/yaspa_cert_key.pem \
            --create
          keychain add-certificates
          cd YaSpa && xcode-project use-profiles

      - name: Bump build number
        run: |
          cd YaSpa
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          agvtool new-version -all $((LATEST + 1))

      - name: Build signed .ipa
        run: cd YaSpa && xcode-project build-ipa --project YaSpa.xcodeproj --scheme App

      - name: Upload to TestFlight
        run: app-store-connect publish --path "YaSpa/build/ios/ipa/*.ipa"
