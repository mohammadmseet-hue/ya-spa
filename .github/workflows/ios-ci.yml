name: iOS build check

on:
  push:
    branches: [ massage-only-ios-app ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd YaSpa && xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          read UDID NAME < <(xcrun simctl list devices available -j | python3 -c "
          import json,sys
          d=json.load(sys.stdin)['devices']
          for runtime in d:
              for dev in d[runtime]:
                  if 'iPhone' in dev['name'] and dev.get('isAvailable'):
                      print(dev['udid'], dev['name']); sys.exit(0)
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Picked simulator: $NAME ($UDID)"

      - name: Build (iOS Simulator, no signing)
        run: |
          set -o pipefail
          cd YaSpa
          xcodebuild build \
            -project YaSpa.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: UI test — real booking flow on the simulator
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cd YaSpa
          xcodebuild test \
            -project YaSpa.xcodeproj \
            -scheme App \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -resultBundlePath "$GITHUB_WORKSPACE/artifacts/TestResults.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Extract booking-flow screenshots
        if: always()
        run: |
          brew install chargepoint/xcparse/xcparse 2>/dev/null || brew install xcparse 2>/dev/null || true
          mkdir -p "$GITHUB_WORKSPACE/artifacts/flow"
          xcparse screenshots "$GITHUB_WORKSPACE/artifacts/TestResults.xcresult" "$GITHUB_WORKSPACE/artifacts/flow" || true
          ls -la "$GITHUB_WORKSPACE/artifacts/flow" || true

      - name: Screenshot the running app
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name 'App.app' -path '*Debug-iphonesimulator*' | head -1)
          echo "App bundle: $APP"
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" 2>/dev/null || true
          sleep 3
          xcrun simctl install "${{ steps.sim.outputs.udid }}" "$APP" || true
          xcrun simctl launch "${{ steps.sim.outputs.udid }}" sa.yaspa.app -uitest || true
          sleep 6
          xcrun simctl io "${{ steps.sim.outputs.udid }}" screenshot "$GITHUB_WORKSPACE/artifacts/home.png" || true
          ls -la "$GITHUB_WORKSPACE/artifacts"

      - name: Archive (device Release, unsigned) — mirrors Codemagic
        run: |
          set -o pipefail
          cd YaSpa
          xcodebuild archive \
            -project YaSpa.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath build/YaSpa.xcarchive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yaspa-evidence
          path: artifacts/
          if-no-files-found: warn

  # Ships the SIGNED build to TestFlight automatically — but ONLY once the three
  # App Store Connect API-key secrets exist. Until then this job self-skips cheaply.
  release:
    runs-on: macos-15
    needs: build
    timeout-minutes: 50
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      BUNDLE_ID: sa.yaspa.app
    steps:
      - name: Are the signing secrets present?
        id: guard
        run: |
          if [ -n "$APP_STORE_CONNECT_ISSUER_ID" ] && [ -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" ] && [ -n "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            echo "Secrets present — delivering signed build to TestFlight."
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "No App Store Connect secrets yet — skipping signed delivery."
          fi
      - uses: actions/checkout@v4
        if: steps.guard.outputs.go == 'true'
      - uses: maxim-lobanov/setup-xcode@v1
        if: steps.guard.outputs.go == 'true'
        with:
          xcode-version: latest-stable
      - name: Install tools
        if: steps.guard.outputs.go == 'true'
        run: |
          brew install xcodegen
          python3 -m pip install --user --break-system-packages codemagic-cli-tools
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"
      - name: Generate Xcode project
        if: steps.guard.outputs.go == 'true'
        run: cd YaSpa && xcodegen generate
      - name: Sign (create cert + profile via the API key)
        if: steps.guard.outputs.go == 'true'
        run: |
          keychain initialize
          app-store-connect bundle-ids create "$BUNDLE_ID" --platform IOS --name "Ya Spa" 2>/dev/null \
            || echo "bundle id already registered — continuing"
          # Apple caps distribution certs at 2. Prior CI runs left orphaned ones (their private
          # keys weren't kept), so revoke all distribution certs to make room. Already-uploaded
          # builds stay validly signed — this only affects future signing.
          CERTS=$(app-store-connect certificates list --json 2>/dev/null | python3 -c "import json,sys;print('\n'.join(c['id'] for c in (json.load(sys.stdin) or []) if 'DISTRIBUTION' in str((c.get('attributes') or {}).get('certificateType','')).upper()))" 2>/dev/null || true)
          for cid in $CERTS; do echo "revoking distribution cert $cid"; app-store-connect certificates delete "$cid" 2>/dev/null || true; done
          openssl genrsa 2048 > /tmp/yaspa_cert_key.pem 2>/dev/null
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/yaspa_cert_key.pem \
            --create
          keychain add-certificates
          cd YaSpa && xcode-project use-profiles
      - name: Bump build number
        if: steps.guard.outputs.go == 'true'
        run: |
          cd YaSpa
          # Unix timestamp = always unique and strictly increasing, so TestFlight never
          # rejects a duplicate CFBundleVersion (build 1 already exists from the old build).
          agvtool new-version -all "$(date +%s)"
      - name: Build signed .ipa
        if: steps.guard.outputs.go == 'true'
        run: cd YaSpa && xcode-project build-ipa --project YaSpa.xcodeproj --scheme App
      - name: Upload to TestFlight
        if: steps.guard.outputs.go == 'true'
        run: app-store-connect publish --path "YaSpa/build/ios/ipa/*.ipa"
