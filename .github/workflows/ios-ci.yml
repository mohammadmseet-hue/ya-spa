name: iOS build check

on:
  push:
    branches: [ massage-only-ios-app ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd YaSpa && xcodegen generate

      - name: Build (iOS Simulator, no signing)
        run: |
          set -o pipefail
          cd YaSpa
          xcodebuild build \
            -project YaSpa.xcodeproj \
            -scheme App \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive (device Release, unsigned) — mirrors Codemagic
        run: |
          set -o pipefail
          cd YaSpa
          xcodebuild archive \
            -project YaSpa.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -archivePath build/YaSpa.xcarchive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
